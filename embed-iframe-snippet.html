<!--
Use this iframe on the NationBuilder page or document template where the chart should appear.
It embeds the dedicated chart page created from `chart-page-template.html`.
Replace CHART_PAGE_URL with the published URL of that dedicated chart page.
-->
<div style="width:100%;max-width:1400px;margin:0 auto;">
  <iframe
    src="CHART_PAGE_URL"
    title="UK Electricity Index"
    loading="lazy"
    style="width:100%;height:780px;border:0;overflow:hidden;background:#ffffff;"
    referrerpolicy="strict-origin-when-cross-origin"
  ></iframe>
</div>
